{% extends "base.html" %}

{% block title %}Register Your Company — TimeComply{% endblock %}

{% block content %}
<div class="row">
  <div class="column column-50 column-offset-25">
    <h2>Register Your Company</h2>
    <p>Set up your company to start tracking time and managing projects.</p>

    <form method="post">
      {% csrf_token %}

      <fieldset>
        <label for="id_name">Company Name</label>
        <input type="text" id="id_name" name="name" placeholder="Acme Contractors LLC" required autofocus>

        <label for="id_period_type">Pay Period Type</label>
        <select id="id_period_type" name="period_type">
          {% for value, label in period_type_choices %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>

        <label for="id_timezone">Timezone</label>
        <select id="id_timezone" name="timezone">
          {% for value, label in timezone_choices %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </fieldset>

      <input type="submit" value="Create Company">
    </form>
  </div>
</div>
{% endblock %}
