{% extends "base.html" %}

{% block title %}Invite Member — {{ company.name }} — TimeComply{% endblock %}

{% block content %}
<div class="row">
  <div class="column column-50 column-offset-25">
    <h2>Invite Member</h2>
    <p>Invite someone to join <strong>{{ company.name }}</strong>.</p>

    <form method="post">
      {% csrf_token %}

      <fieldset>
        <label for="id_email">Email Address</label>
        <input
          type="email"
          id="id_email"
          name="email"
          required
          placeholder="employee@example.com"
          value="{{ request.POST.email|default:'' }}"
        >

      </fieldset>

      <input type="submit" value="Send Invitation">
      <a href="{% url 'companies:members' %}" class="button button-outline">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
