name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Push commits and create branches
      pull-requests: write  # Create and comment on PRs
      issues: write         # Comment on issues
      id-token: write       # OIDC token for auth
      actions: read         # Read CI results so Claude can check test output

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: timecomply_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/timecomply_test
      SECRET_KEY: ci-secret-key-not-used-in-production
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Allow Claude to read CI/Actions results (redundant with workflow-level
          # permissions but kept here so the action itself requests the scope too)
          additional_permissions: |
            actions: read

          # Skip all permission prompts — the runner VM is ephemeral and gets
          # destroyed after the job, so there is no risk to permanent infrastructure.
          # This gives Claude access to every tool (Bash, Edit, Write, etc.)
          # without needing to enumerate them individually.
          claude_args: "--dangerously-skip-permissions"
