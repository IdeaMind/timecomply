name: AI Issue Implementation

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to implement"
        required: true
        type: number

jobs:
  implement:
    name: Implement Issue with Claude
    runs-on: ubuntu-latest
    # Only run when 'ready-for-ai' label is added, or via manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'ready-for-ai')

    permissions:
      contents: write
      pull-requests: write
      issues: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: timecomply
          POSTGRES_PASSWORD: timecomply
          POSTGRES_DB: timecomply_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://timecomply:timecomply@localhost:5432/timecomply_test
      SECRET_KEY: ci-test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Get issue details
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.inputs.issue_number }}"
          echo "number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

          # Fetch issue body and title
          gh issue view $ISSUE_NUMBER --json title,body,labels \
            --jq '{title: .title, body: .body, labels: [.labels[].name]}' \
            > /tmp/issue.json

          echo "Issue details fetched for #$ISSUE_NUMBER"
          cat /tmp/issue.json

      - name: Create implementation branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          BRANCH="feature/issue-${ISSUE_NUMBER}-ai-implementation"
          git config user.name "TimeComply AI"
          git config user.email "ai@timecomply.app"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Claude Code to implement the issue
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.ANTHROPIC_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"

          # Read the issue content
          ISSUE_CONTENT=$(cat /tmp/issue.json)

          # Create a prompt file for Claude
          cat > /tmp/claude-prompt.md << 'PROMPT_EOF'
          You are implementing a GitHub issue for the TimeComply project.

          Read the issue details below and implement the requested feature according to the
          Acceptance Criteria and Implementation Notes in the issue.

          Key rules:
          - Follow all instructions in CLAUDE.md
          - Write failing tests first, then implement to make them pass
          - Run `uv run ruff check --fix . && uv run ruff format .` before finishing
          - Run `uv run python manage.py makemigrations` if you changed any models
          - Run `uv run pytest` to verify all tests pass
          - Do not over-engineer; implement exactly what the issue asks for
          - If tests fail after implementation, fix them before finishing

          ISSUE CONTENT:
          PROMPT_EOF

          cat /tmp/issue.json >> /tmp/claude-prompt.md

          # Run Claude Code with the issue prompt
          claude --print --no-conversation /tmp/claude-prompt.md

      - name: Install dependencies (for CI validation)
        run: uv sync --frozen

      - name: Run lint check
        id: lint
        run: |
          uv run ruff check . 2>&1 | tee /tmp/lint-output.txt
          uv run ruff format --check . 2>&1 | tee -a /tmp/lint-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run migrations
        run: uv run python manage.py migrate --noinput
        continue-on-error: true

      - name: Run tests
        id: tests
        run: |
          uv run pytest --cov=apps --cov-report=term-missing -v 2>&1 | tee /tmp/test-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A
          git diff --staged --quiet || \
            git commit -m "feat: implement issue #${{ steps.issue.outputs.number }} via Claude Code

          Automated implementation of GitHub issue #${{ steps.issue.outputs.number }}.
          Review the PR for details and verify Human Testing Notes.

          Co-authored-by: Claude <claude@anthropic.com>"

          git push origin "${{ steps.branch.outputs.branch }}"

      - name: Extract human testing notes from issue
        id: testing_notes
        run: |
          # Extract the Human Testing Notes section from the issue body
          python3 - << 'EOF'
          import json, re
          with open('/tmp/issue.json') as f:
              data = json.load(f)
          body = data.get('body', '')
          match = re.search(r'## Human Testing Notes\s*(.*?)(?=##|\Z)', body, re.DOTALL)
          notes = match.group(1).strip() if match else 'No human testing notes found in issue.'
          with open('/tmp/testing-notes.txt', 'w') as f:
              f.write(notes)
          EOF

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          LINT_STATUS="✅ Passed"
          TEST_STATUS="✅ Passed"

          [ "${{ steps.lint.outputs.exit_code }}" != "0" ] && LINT_STATUS="❌ Failed"
          [ "${{ steps.tests.outputs.exit_code }}" != "0" ] && TEST_STATUS="❌ Failed"

          TESTING_NOTES=$(cat /tmp/testing-notes.txt)
          LINT_OUTPUT=$(tail -20 /tmp/lint-output.txt 2>/dev/null || echo "No output")
          TEST_OUTPUT=$(tail -30 /tmp/test-output.txt 2>/dev/null || echo "No output")

          gh pr create \
            --title "feat: implement #${ISSUE_NUMBER}" \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --body "$(cat << EOF
          ## Summary
          AI-generated implementation of issue #${ISSUE_NUMBER}.

          Closes #${ISSUE_NUMBER}

          ---

          ## CI Results (Pre-check)

          | Check | Status |
          |-------|--------|
          | Lint | ${LINT_STATUS} |
          | Tests | ${TEST_STATUS} |

          ### Lint Output
          \`\`\`
          ${LINT_OUTPUT}
          \`\`\`

          ### Test Output
          \`\`\`
          ${TEST_OUTPUT}
          \`\`\`

          ---

          ## 🧪 Human Testing Notes

          **A human must verify the following before merging:**

          ${TESTING_NOTES}

          ---

          > 🤖 Generated by [Claude Code](https://claude.ai/code) via AI implementation workflow
          EOF
          )"

      - name: Comment on issue with PR link
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr list --head "${{ steps.branch.outputs.branch }}" --json url --jq '.[0].url')
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --body "🤖 AI implementation complete! PR created: ${PR_URL}

          Please review the PR and complete the **Human Testing Notes** before merging."

      - name: Remove ready-for-ai label, add in-review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ steps.issue.outputs.number }}" \
            --remove-label "ready-for-ai" \
            --add-label "ai-implemented"
