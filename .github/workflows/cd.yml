name: CD

on:
  push:
    branches: [main]        # Deploy to staging
    tags:
      - "v*.*.*"            # Deploy to production on version tags

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway Staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          railway up --service timecomply-staging --environment staging

      - name: Run migrations on Staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          railway run --service timecomply-staging --environment staging \
            python manage.py migrate --noinput

      - name: Notify deployment
        if: always()
        run: |
          echo "Staging deployment status: ${{ job.status }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway Production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
        run: |
          railway up --service timecomply --environment production

      - name: Run migrations on Production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
        run: |
          railway run --service timecomply --environment production \
            python manage.py migrate --noinput

      - name: Tag deployment in audit trail
        run: |
          echo "Production deployment of ${{ github.ref_name }} complete"
